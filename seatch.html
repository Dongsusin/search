<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="./seatch.css" />
    <title>지뢰찾기</title>
  </head>

  <body>
    <div id="gameBoard"></div>

    <div class="gameSet">
      <input
        type="number"
        id="row"
        min="1"
        max="20"
        placeholder="가로(최대:20)"
      />
      <input
        type="number"
        id="col"
        min="1"
        max="20"
        placeholder="세로(최대:20)"
      />
      <input
        type="number"
        id="mineNum"
        max="399"
        placeholder="지뢰 개수(최대:399)"
      />
      <button id="startBtn">게임 시작</button>
    </div>
    <!--script-->
    <script src="./seatch.js"></script>
  </body>
</html>
